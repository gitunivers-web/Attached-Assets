packages:
  "framer-motion": "For page transitions, smooth modal interactions, and virtual tour animations"
  "date-fns": "For formatting dates in the booking and calendar components"
  "lucide-react": "For beautiful UI icons"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for merging tailwind classes without style conflicts"

images:
  - path: "artifacts/immo-location/public/images/hero-luxury.png"
    description: "A stunning, hyper-realistic, architectural photography view of a luxury Parisian penthouse living room with golden hour lighting, Eiffel tower visible through the large window, elegant modern furniture, warm tones, high-end real estate style"
    aspect_ratio: "16:9"
  - path: "artifacts/immo-location/public/images/logo-mark.png"
    description: "A minimalist, elegant logo mark for a luxury real estate brand featuring a stylized geometric building or key motif in metallic gold on a transparent background"
    aspect_ratio: "1:1"

notes:
  - This is a frontend-only mockup using client-side data generation for 160+ apartments.
  - State management uses React Context + LocalStorage for favorites and booking flow.
  - No external backend API calls are made.
